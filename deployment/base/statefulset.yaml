apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dmozdb
spec:
  serviceName: dmozdb
  # Single writer: the backend owns one on-disk database. Scaling out is a
  # protocol/replication change, not a replica bump.
  replicas: 1
  selector:
    matchLabels:
      app: dmozdb
  template:
    metadata:
      labels:
        app: dmozdb
    spec:
      # The "dmozdb" Service would inject DMOZDB_PORT=tcp://<ip>:8080 as a
      # legacy service-link env var, clobbering the backend's own DMOZDB_PORT.
      # The app needs no service-link vars, so disable them.
      enableServiceLinks: false
      containers:
        - name: dmozdb
          image: dmozdb-backend:latest
          ports:
            - containerPort: 8080
              name: dmozdb
          # The frontend now runs in a separate pod and reaches the backend over
          # the cluster network, so the backend binds 0.0.0.0 and trusts the
          # flannel pod CIDR (10.244.0.0/16) plus the node subnet (10.0.1.0/24,
          # the source of kubelet tcpSocket probes). Without the node subnet the
          # startup/liveness probe connection is rejected at accept.
          env:
            - name: DMOZDB_BIND
              value: "0.0.0.0"
            - name: DMOZDB_PORT
              value: "8080"
            - name: DMOZDB_TRUSTED
              value: "10.244.0.0/16,10.0.1.0/24"
            - name: DMOZDB_CACHE_SIZE_MB
              value: "256"
            - name: DMOZDB_THREAD_COUNT
              value: "4"
          volumeMounts:
            - name: data
              mountPath: /var/lib/dmozdb
          # The backend speaks a raw binary protocol, not HTTP, so probes use a
          # bare TCP connect. A dead backend stops accepting on 8080 → the probe
          # fails → the pod restarts.
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 3
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              # Raised from the combined image's 1000m now that the CPU-heavy
              # Deno SSR runs in its own pod and no longer shares this budget.
              memory: "2Gi"
              cpu: "1500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
