apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  # Stateless SSR; the HPA owns the replica count (min 2). 2 here is just the
  # pre-HPA starting point.
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # The "dmozdb" Service would inject DMOZDB_PORT=tcp://<ip>:8080 as a
      # service-link env var; the frontend sets DMOZDB_PORT itself, so disable
      # the legacy links to avoid the clobber.
      enableServiceLinks: false
      # Spread replicas across both nodes when possible so a node loss doesn't
      # take the whole frontend down.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: web
          image: dmozdb-web:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DMOZDB_HOST
              value: "dmozdb.dmozdb.svc.cluster.local"
            - name: DMOZDB_PORT
              value: "8080"
            - name: KV_PATH
              value: "http://denokv.dmozdb.svc.cluster.local:4512"
            - name: DENO_KV_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: denokv-auth
                  key: token
          # /healthz returns 200 only when the backend is reachable, so it gates
          # startup and readiness (don't serve traffic without a backend). For
          # liveness we only check the web process itself — a backend blip must
          # not trigger a restart storm of the frontend.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  # Ceiling on the current free-tier cluster (~2100m free after ticketlist→1):
  # 4 × 200m requests fits with headroom for denokv + dmozdb burst.
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
