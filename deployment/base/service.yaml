apiVersion: v1
kind: Service
metadata:
  name: dmozdb
  labels:
    app: dmozdb
spec:
  # Backend protocol endpoint. Reachable only in-cluster (ClusterIP); the web
  # frontend connects here, and the Zig backend's CIDR trust + this service's
  # non-exposure are the access boundary. The web frontend's own Service lives
  # in web.yaml; denokv's in denokv.yaml.
  type: ClusterIP
  selector:
    app: dmozdb
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: dmozdb
