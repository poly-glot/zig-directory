apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: dmozdb

patches:
- path: statefulset.yaml
- path: web.yaml
- path: ingress.yaml

# The CD pipeline rewrites both newTags to the built commit SHA via
# `kustomize edit set image dmozdb-backend=<repo>:<sha>-backend dmozdb-web=<repo>:<sha>-web`
# before applying. Both images share the one OCIR repo, distinguished by tag suffix.
images:
- name: dmozdb-backend
  newName: lhr.ocir.io/lrhvckxzwf3l/zig-directory
  newTag: d021b7580b427a47a28f357e01b366f81a33dcd6-backend
- name: dmozdb-web
  newName: lhr.ocir.io/lrhvckxzwf3l/zig-directory
  newTag: d021b7580b427a47a28f357e01b366f81a33dcd6-web
