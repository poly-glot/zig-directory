<svg id="state-svg" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 680px; background-color: white;" viewBox="0 0 680 220" role="graphics-document document" aria-roledescription="flowchart-v2">
  <style>
    #state-svg { font-family: Arial, sans-serif; font-size: 14px; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 2px; rx: 4; ry: 4; }
    .box-active { fill: #fff; stroke: #000; stroke-width: 3px; }
    .label { text-anchor: middle; font-size: 13px; fill: #000; font-weight: bold; }
    .edge { stroke: #000; stroke-width: 2px; fill: none; }
    .edge-label { text-anchor: middle; font-size: 11px; fill: #555; }
    .arrow { fill: #000; stroke: #000; stroke-width: 1px; }
  </style>
  <defs>
    <marker id="state-arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Connection State Machine (Binary Protocol)</text>

  <!-- empty -->
  <rect x="20" y="90" width="100" height="45" rx="4" ry="4" class="box"/>
  <text x="70" y="117" class="label">empty</text>

  <!-- Arrow: empty -> reading_request -->
  <line x1="120" y1="112" x2="175" y2="112" class="edge" marker-end="url(#state-arrowEnd)"/>
  <text x="147" y="103" class="edge-label">accept</text>

  <!-- reading_request -->
  <rect x="180" y="82" width="150" height="60" rx="4" ry="4" class="box-active"/>
  <text x="255" y="108" class="label">reading</text>
  <text x="255" y="126" class="label">_request</text>

  <!-- Arrow: reading_request -> writing_response -->
  <line x1="330" y1="112" x2="385" y2="112" class="edge" marker-end="url(#state-arrowEnd)"/>
  <text x="357" y="103" class="edge-label">frames</text>

  <!-- writing_response -->
  <rect x="390" y="82" width="150" height="60" rx="4" ry="4" class="box"/>
  <text x="465" y="108" class="label">writing</text>
  <text x="465" y="126" class="label">_response</text>

  <!-- Arrow: writing_response -> closing -->
  <line x1="540" y1="112" x2="575" y2="112" class="edge" marker-end="url(#state-arrowEnd)"/>

  <!-- closing -->
  <rect x="580" y="90" width="80" height="45" rx="4" ry="4" class="box"/>
  <text x="620" y="117" class="label">closing</text>

  <!-- persistent loop: writing_response back to reading_request -->
  <path d="M 465 82 C 465 45, 465 45, 465 45 L 255 45 C 255 45, 255 45, 255 82" class="edge" marker-end="url(#state-arrowEnd)"/>
  <text x="360" y="40" class="edge-label">persistent (keep buffer)</text>
</svg>
