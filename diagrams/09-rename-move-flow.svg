<svg id="rename-move-svg" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 940px; background-color: white;" viewBox="0 0 940 1380" role="graphics-document document" aria-roledescription="flowchart-v2">
  <style>
    #rename-move-svg { font-family: Arial, sans-serif; font-size: 14px; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 2px; }
    .box-muted { fill: #f5f5f5; stroke: #000; stroke-width: 1px; }
    .box-strong { fill: #fff; stroke: #000; stroke-width: 3px; }
    .label { text-anchor: middle; font-size: 14px; fill: #000; font-weight: bold; }
    .sublabel { text-anchor: middle; font-size: 12px; fill: #666; }
    .note { text-anchor: start; font-size: 11px; fill: #555; }
    .edge { stroke: #000; stroke-width: 2px; fill: none; }
    .edge-dashed { stroke: #000; stroke-width: 2px; fill: none; stroke-dasharray: 6,3; }
    .arrow { fill: #000; stroke: #000; stroke-width: 1px; }
    .group-title { text-anchor: start; font-size: 12px; font-weight: bold; fill: #666; }
    .edge-label { text-anchor: middle; font-size: 11px; fill: #555; }
    .badge { font-size: 11px; font-weight: bold; fill: #555; text-anchor: middle; }
  </style>
  <defs>
    <marker id="rename-move-arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="470" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Slug-Path Repair Flow (rename / move)</text>
  <text x="470" y="46" text-anchor="middle" font-size="12" fill="#666">hybrid in-line / queued — Slice 1</text>

  <!-- ============= ENTRY ============= -->
  <!-- updateCategory / moveCategory -->
  <rect x="270" y="60" width="400" height="60" rx="4" class="box-strong"/>
  <text x="470" y="84" class="label">updateCategory(slug rename) / moveCategory</text>
  <text x="470" y="102" class="sublabel">(operations.zig)</text>
  <text x="470" y="115" class="sublabel">entry point</text>

  <line x1="470" y1="120" x2="470" y2="148" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- compute*ChangeSet -->
  <rect x="250" y="153" width="440" height="62" rx="4" class="box"/>
  <text x="470" y="176" class="label">computeRenameChangeSet / computeMoveChangeSet</text>
  <text x="470" y="194" class="sublabel">(operations.zig)</text>
  <text x="470" y="208" class="sublabel">DFS via cat_by_parent, capped at threshold + 1</text>

  <line x1="470" y1="215" x2="470" y2="243" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- Decision -->
  <rect x="290" y="248" width="360" height="62" rx="4" class="box"/>
  <text x="470" y="272" class="label">descendants &#8804; rename_inline_threshold?</text>
  <text x="470" y="290" class="sublabel">db.config (default 5000)</text>
  <text x="470" y="304" class="sublabel">single gate, two ChangeSet shapes</text>

  <!-- "yes" branch — left column -->
  <line x1="290" y1="279" x2="200" y2="279" class="edge"/>
  <line x1="200" y1="279" x2="200" y2="350" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="245" y="273" class="edge-label">yes (atomic)</text>

  <!-- "no" branch — right column -->
  <line x1="650" y1="279" x2="740" y2="279" class="edge"/>
  <line x1="740" y1="279" x2="740" y2="350" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="695" y="273" class="edge-label">no (queued)</text>

  <!-- ============= ATOMIC SUBGRAPH (LEFT) ============= -->
  <rect x="40" y="335" width="320" height="430" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="50" y="354" class="group-title">Atomic in-line branch</text>
  <text x="350" y="354" class="badge" text-anchor="end">single commit</text>

  <!-- ChangeSet shape (atomic) -->
  <rect x="60" y="365" width="280" height="92" rx="4" class="box-muted"/>
  <text x="200" y="384" class="label">ChangeSet</text>
  <text x="200" y="403" class="sublabel">CategoryRenamed/Moved</text>
  <text x="200" y="419" class="sublabel">descendant_swaps = [...]</text>
  <text x="200" y="435" class="sublabel">enqueue = .{}</text>
  <text x="200" y="451" class="sublabel">(populated in compute*ChangeSet)</text>

  <line x1="200" y1="457" x2="200" y2="487" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- apply -->
  <rect x="60" y="492" width="280" height="58" rx="4" class="box"/>
  <text x="200" y="515" class="label">apply.applyCategoryRenamed/Moved</text>
  <text x="200" y="533" class="sublabel">(apply.zig)</text>

  <line x1="200" y1="550" x2="200" y2="580" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- delete + insert SELF + descendants -->
  <rect x="60" y="585" width="280" height="78" rx="4" class="box"/>
  <text x="200" y="607" class="label">delete-old + insert-new</text>
  <text x="200" y="625" class="sublabel">SELF + EVERY descendant</text>
  <text x="200" y="641" class="sublabel">slug_path + slug_only B+Trees</text>
  <text x="200" y="656" class="sublabel">same WAL frame</text>

  <line x1="200" y1="663" x2="200" y2="693" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- DONE -->
  <rect x="100" y="698" width="200" height="50" rx="4" class="box-strong"/>
  <text x="200" y="720" class="label">DONE</text>
  <text x="200" y="738" class="sublabel">single db.commit, atomic</text>

  <!-- ============= QUEUED SUBGRAPH (RIGHT) ============= -->
  <rect x="580" y="335" width="320" height="430" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="590" y="354" class="group-title">Queued async branch</text>
  <text x="890" y="354" class="badge" text-anchor="end">deferred</text>

  <!-- ChangeSet shape (queued) -->
  <rect x="600" y="365" width="280" height="108" rx="4" class="box-muted"/>
  <text x="740" y="384" class="label">ChangeSet</text>
  <text x="740" y="403" class="sublabel">CategoryRenamed/Moved</text>
  <text x="740" y="419" class="sublabel">descendant_swaps = &amp;.{}</text>
  <text x="740" y="435" class="sublabel">enqueue.seq != 0</text>
  <text x="740" y="451" class="sublabel">old_slug_prefix = "..."</text>
  <text x="740" y="467" class="sublabel">(rename + enqueue, same frame)</text>

  <line x1="740" y1="473" x2="740" y2="503" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- apply -->
  <rect x="600" y="508" width="280" height="58" rx="4" class="box"/>
  <text x="740" y="531" class="label">apply.applyCategoryRenamed/Moved</text>
  <text x="740" y="549" class="sublabel">(apply.zig)</text>

  <!-- two children: SELF only + queue write -->
  <line x1="740" y1="566" x2="740" y2="588" class="edge"/>
  <line x1="630" y1="588" x2="850" y2="588" class="edge"/>
  <line x1="630" y1="588" x2="630" y2="610" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <line x1="850" y1="588" x2="850" y2="610" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- SELF only -->
  <rect x="595" y="615" width="160" height="68" rx="4" class="box"/>
  <text x="675" y="636" class="label">delete-old + insert-new</text>
  <text x="675" y="653" class="sublabel">SELF only</text>
  <text x="675" y="668" class="sublabel">slug_path + slug_only</text>

  <!-- Queue write -->
  <rect x="775" y="615" width="160" height="68" rx="4" class="box-muted"/>
  <text x="855" y="636" class="label">RepairTask &#8594; queue</text>
  <text x="855" y="653" class="sublabel">slug_path_repair_queue</text>
  <text x="855" y="668" class="sublabel">key = big-endian seq</text>

  <!-- Rejoin -->
  <line x1="675" y1="683" x2="675" y2="710" class="edge"/>
  <line x1="855" y1="683" x2="855" y2="710" class="edge"/>
  <line x1="675" y1="710" x2="855" y2="710" class="edge"/>
  <line x1="765" y1="710" x2="765" y2="730" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- Rename commit returns -->
  <rect x="640" y="735" width="250" height="22" rx="4" class="box-strong"/>
  <text x="765" y="751" class="label">Rename commit returns</text>

  <!-- Atomic-with-rename annotation -->
  <text x="935" y="630" class="note" text-anchor="end">atomic-with-rename:</text>
  <text x="935" y="645" class="note" text-anchor="end">no "rename without enqueue"</text>
  <text x="935" y="660" class="note" text-anchor="end">state on crash recovery</text>

  <!-- ============= REPAIR WORKER (below queued) ============= -->
  <rect x="560" y="790" width="360" height="280" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="570" y="809" class="group-title">repair_worker — async drain</text>
  <text x="910" y="809" class="badge" text-anchor="end">WAL-covered per chunk</text>

  <!-- dashed "later" arrow from rename commit -->
  <line x1="765" y1="757" x2="765" y2="822" class="edge-dashed" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="775" y="783" class="edge-label" text-anchor="start">later (async)</text>

  <!-- worker tick -->
  <rect x="600" y="825" width="280" height="50" rx="4" class="box"/>
  <text x="740" y="846" class="label">repair_worker tick</text>
  <text x="740" y="864" class="sublabel">(repair_worker.zig)</text>

  <line x1="740" y1="875" x2="740" y2="898" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- peekMin -->
  <rect x="600" y="903" width="280" height="42" rx="4" class="box"/>
  <text x="740" y="921" class="label">peekMin(slug_path_repair_queue)</text>
  <text x="740" y="938" class="sublabel">oldest pending repair</text>

  <line x1="740" y1="945" x2="740" y2="968" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- walk descendants -->
  <rect x="600" y="973" width="280" height="42" rx="4" class="box"/>
  <text x="740" y="991" class="label">walk descendants</text>
  <text x="740" y="1008" class="sublabel">cat_by_parent traversal</text>

  <line x1="740" y1="1015" x2="740" y2="1038" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- chunk commits -->
  <rect x="600" y="1043" width="280" height="62" rx="4" class="box"/>
  <text x="740" y="1064" class="label">ChangeSet { slug_path_repair_chunk }</text>
  <text x="740" y="1082" class="sublabel">10000 descendants per chunk</text>
  <text x="740" y="1098" class="sublabel">db.commit per chunk (durable)</text>

  <!-- self-loop arrow showing repeat -->
  <line x1="600" y1="1074" x2="568" y2="1074" class="edge"/>
  <line x1="568" y1="1074" x2="568" y2="990" class="edge"/>
  <line x1="568" y1="990" x2="600" y2="990" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="556" y="1032" class="edge-label" text-anchor="end">repeat</text>

  <line x1="740" y1="1105" x2="740" y2="1128" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- complete -->
  <rect x="600" y="1133" width="280" height="60" rx="4" class="box-strong"/>
  <text x="740" y="1155" class="label">ChangeSet { slug_path_repair_complete }</text>
  <text x="740" y="1173" class="sublabel">final commit removes queue entry</text>
  <text x="740" y="1187" class="sublabel">repair window closed</text>

  <!-- ============= READ SIDE PANEL (left/center, below atomic) ============= -->
  <rect x="40" y="790" width="500" height="403" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="50" y="809" class="group-title">Read side — resolveSlugPath</text>
  <text x="530" y="809" class="badge" text-anchor="end">queue-depth gated</text>

  <!-- entry -->
  <rect x="140" y="825" width="300" height="50" rx="4" class="box-strong"/>
  <text x="290" y="846" class="label">resolveSlugPath(path)</text>
  <text x="290" y="864" class="sublabel">(operations.zig)</text>

  <line x1="290" y1="875" x2="290" y2="898" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- gate -->
  <rect x="120" y="903" width="340" height="58" rx="4" class="box"/>
  <text x="290" y="925" class="label">slug_path_repair_queue.entry_count == 0?</text>
  <text x="290" y="943" class="sublabel">single counter check, no scan</text>

  <!-- yes branch — fast path -->
  <line x1="120" y1="932" x2="80" y2="932" class="edge"/>
  <line x1="80" y1="932" x2="80" y2="1000" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="100" y="978" class="edge-label" text-anchor="start">yes</text>

  <rect x="55" y="1005" width="170" height="62" rx="4" class="box"/>
  <text x="140" y="1027" class="label">return cat_id</text>
  <text x="140" y="1045" class="sublabel">steady state</text>
  <text x="140" y="1060" class="sublabel">fast path, no extra cost</text>

  <!-- no branch — repair window -->
  <line x1="460" y1="932" x2="500" y2="932" class="edge"/>
  <line x1="500" y1="932" x2="500" y2="1000" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="476" y="978" class="edge-label" text-anchor="start">no</text>

  <rect x="320" y="1005" width="200" height="62" rx="4" class="box"/>
  <text x="420" y="1027" class="label">walk parent chain</text>
  <text x="420" y="1045" class="sublabel">buildCanonicalSlugPath(cat)</text>
  <text x="420" y="1060" class="sublabel">repair-window cost</text>

  <line x1="420" y1="1067" x2="420" y2="1090" class="edge" marker-end="url(#rename-move-arrowEnd)"/>

  <!-- compare -->
  <rect x="320" y="1095" width="200" height="50" rx="4" class="box"/>
  <text x="420" y="1116" class="label">canonical == query path?</text>
  <text x="420" y="1133" class="sublabel">(strict compare)</text>

  <!-- yes -> rejoin to fast path -->
  <line x1="320" y1="1120" x2="285" y2="1120" class="edge"/>
  <line x1="285" y1="1120" x2="285" y2="1036" class="edge"/>
  <line x1="285" y1="1036" x2="225" y2="1036" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="305" y="1114" class="edge-label">yes</text>

  <!-- no -> not_found (orphan hidden) -->
  <line x1="420" y1="1145" x2="420" y2="1163" class="edge" marker-end="url(#rename-move-arrowEnd)"/>
  <text x="430" y="1158" class="edge-label" text-anchor="start">no</text>

  <rect x="320" y="1168" width="200" height="22" rx="4" class="box-strong"/>
  <text x="420" y="1184" class="label">return not_found  (orphan hidden)</text>

  <!-- ============= INVARIANTS BAND ============= -->
  <rect x="40" y="1215" width="880" height="150" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="50" y="1234" class="group-title">Invariants</text>

  <text x="60" y="1258" class="note">1. Hybrid threshold gate. One compute*ChangeSet decides between two ChangeSet shapes based on db.config.rename_inline_threshold (5000 default).</text>
  <text x="60" y="1278" class="note">2. Atomic-with-rename enqueue. Queue write lives in the SAME ChangeSet as the rename, so crash recovery never sees "rename without enqueue".</text>
  <text x="60" y="1298" class="note">3. Worker is WAL-covered. Each chunk is its own db.commit, so progress is durable per chunk; slug_path_repair_complete is the final commit and removes the queue entry.</text>
  <text x="60" y="1318" class="note">4. Read-side gate is on queue depth. Steady state pays nothing; during the window every resolveSlugPath does a canonical-path walk.</text>
  <text x="60" y="1346" class="note" style="font-style: italic; fill: #888">Slice 1 — commits up through f6a027f.  Style matches diagrams 01 / 07 / 08.</text>
</svg>
