<svg id="wal-svg" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width: 520px; background-color: white;" viewBox="0 0 520 320" role="graphics-document document" aria-roledescription="flowchart-v2">
  <style>
    #wal-svg { font-family: Arial, sans-serif; font-size: 14px; fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 2px; }
    .section { fill: #f5f5f5; stroke: #000; stroke-width: 1.5px; }
    .section-data { fill: #fff; stroke: #000; stroke-width: 1.5px; }
    .label { text-anchor: middle; font-size: 14px; fill: #000; font-weight: bold; }
    .field { text-anchor: start; font-size: 13px; fill: #000; font-family: 'Courier New', monospace; }
    .field-note { text-anchor: end; font-size: 11px; fill: #555; }
    .sublabel { text-anchor: middle; font-size: 12px; fill: #555; }
    .divider { stroke: #000; stroke-width: 1px; stroke-dasharray: 3,3; }
  </style>

  <!-- Title -->
  <text x="260" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">WAL Entry Format (24-byte header + data)</text>

  <!-- Outer box -->
  <rect x="50" y="50" width="420" height="250" rx="4" class="box"/>

  <!-- Header section -->
  <rect x="50" y="50" width="420" height="175" rx="4" class="section"/>
  <text x="260" y="75" class="label">Header (24 bytes)</text>
  <line x1="50" y1="85" x2="470" y2="85" class="divider"/>

  <text x="75" y="112" class="field">sequence  : u64</text>
  <text x="445" y="112" class="field-note">Monotonically increasing</text>

  <text x="75" y="142" class="field">op_code   : u8 + padding (3B)</text>
  <text x="445" y="142" class="field-note">Operation type</text>

  <text x="75" y="172" class="field">data_len  : u32</text>
  <text x="445" y="172" class="field-note">Payload length in bytes</text>

  <text x="75" y="202" class="field">checksum  : u32 + padding (4B)</text>
  <text x="445" y="202" class="field-note">CRC32 of data bytes</text>

  <!-- Data section -->
  <rect x="50" y="225" width="420" height="75" rx="0" class="section-data"/>
  <text x="260" y="260" class="label">data (variable length)</text>
  <text x="260" y="282" class="sublabel">Serialized Category or Link</text>
</svg>